<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Profile · Gemstone</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <header class="topbar">
    <a class="brand" href="index.html">💎 Gemstone</a>
    <nav>
      <a href="index.html">Home</a>
      <a href="membership.html">Membership</a>
      <a class="active" href="profile.html">Profile</a>
      <button id="logoutBtn" class="link-button">Logout</button>
    </nav>
  </header>

  <main class="container">
    <div class="hero">
      <div>
        <p class="eyebrow">ACCOUNT</p>
        <h1>Your profile and wallet</h1>
        <p class="muted" id="profileEmail"></p>
      </div>
    </div>

    <div id="profileSummary" class="summary-grid"></div>

    <section class="panel">
      <h2>Demo cash-in</h2>
      <p class="muted">For testing only. This does not connect to a real payment provider.</p>
      <form id="cashInForm" class="inline-form">
        <label>Amount
          <input id="cashInAmount" type="number" min="1" max="100000" step="0.01" required>
        </label>
        <button class="primary" type="submit">Add demo funds</button>
      </form>
      <p id="profileMessage" class="message"></p>
    </section>

    <section class="panel">
      <h2>Recent wallet activity</h2>
      <div class="table-wrap">
        <table>
          <thead><tr><th>Date</th><th>Type</th><th>Amount</th><th>Details</th></tr></thead>
          <tbody id="walletTransactions"></tbody>
        </table>
      </div>
    </section>

    <section class="panel">
      <h2>Recent point activity</h2>
      <div class="table-wrap">
        <table>
          <thead><tr><th>Date</th><th>Type</th><th>Points</th><th>Details</th></tr></thead>
          <tbody id="pointTransactions"></tbody>
        </table>
      </div>
    </section>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="config.js"></script>
  <script src="js/common.js"></script>
  <script src="js/profile.js"></script>
</body>
</html>
